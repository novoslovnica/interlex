<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- Верхний синий треугольник -->
    <polygon points="0,0 32,0 16,16" fill="#1B4294" />
    <!-- Левый желтый треугольник -->
    <polygon points="0,0 0,32 16,16" fill="#FAD131" />
    <!-- Правый белый треугольник -->
    <polygon points="32,0 32,32 16,16" fill="#EEEEEE" />
    <!-- Нижний красный треугольник -->
    <polygon points="0,32 32,32 16,16" fill="#D32F2F" />
</svg>
